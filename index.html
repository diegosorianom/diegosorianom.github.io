<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Diego Soriano Github Pages</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link rel='stylesheet' type='text/css' media='screen' href='stylesheet.css'>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inconsolata:wght@200;300;400;500;600;700;800;900&display=swap');
        body {
            font-family: 'Inconsolata', monospace;
        }
        .hidden-content {
          display: none;
        }
    </style>

<body class="h-screen flex justify-center items-center p-0 md:p-0 lg:p-6 xl:p-12 bg-[#FFFDE6]">
    <div class="border border-black w-full h-full flex flex-col">
        <!-- infobar -->
        <div class="w-full p-2 md:p-3 lg:p-2 xl:p-2 flex flex-row justify-between items-center bg-[#181818]">
            <div class="text-sm md:text-base lg:text-lg xl:text-xl text-[#FFFDE6] font-semibold">

            </div>
            <div class="text-sm md:text-base lg:text-lg xl:text-xl text-[#FFFDE6] font-semibold">
                07/10/2024
            </div>
        </div>
        <!-- navbar -->
        <div class="w-full h-12 border-b border-[#181818] flex flex-row">
            <div class="flex flex-[7] flex-row items-center justify-start px-3">
                <button onclick="router.loadContent('home')" class="h-full w-12 flex items-center justify-center">
                    <img src="/img/svg/home_24dp_E8EAED_FILL0_wght400_GRAD0_opsz24.svg" alt="home" class="h-8 w-8">                
                </button>
                <button onclick="router.loadContent('proyectos')" class="h-full w-12 flex items-center justify-center">
                    <img src="/img/svg/folder_24dp_E8EAED_FILL0_wght400_GRAD0_opsz24.svg" alt="proyectos" class="h-8 w-8">                
                </button>
                <button onclick="router.loadContent('sobreMi')" class="h-full w-12 flex items-center justify-center">
                    <img src="/img/svg/emoji_people_24dp_E8EAED_FILL0_wght400_GRAD0_opsz24.svg" alt="sobre mi" class="h-8 w-8">                
                </button>
            </div>
            <button onclick="router.loadContent('contacto')" class="flex flex-[4] md:flex-[2] lg:flex-[2] xl:flex-[2] flex-row items-center justify-center border-l border-r border-[#181818] transition duration-300 ease-in-out hover:bg-[#181818] hover:text-[#FFFDE6] text-xl md:text-xl lg:text-xl xl:text-2xl text-[#181818] font-semibold">
                Contacto
            </button>
            <button id="darkModeToggle" class="flex flex-[1] flex-row items-center justify-center">
                <img src="/img/svg/dark_mode_24dp_E8EAED_FILL0_wght400_GRAD0_opsz24.svg" alt="dark mode" class="h-8 w-8">
            </button>            
        </div>
        <!-- main content -->
        <div id="main-content" class="w-full h-full flex flex-col justify-between overflow-y-auto">
            <!-- Contenido inicial aquí -->
        </div>
        <!-- footer -->
        <div class="w-full bg-[#181818] p-2 md:p-3 lg:p-2 xl:p-2">
            <div class="text-sm md:text-base lg:text-lg xl:text-xl text-[#FFFDE6] font-semibold flex justify-center items-center">
                <p>Diego Soriano Magallón 2024</p>
                <div class="flex flex-row justify-center items-center mx-6">
                    <a class="px-2" href="https://github.com/diegosorianom" target="_blank" rel="noopener noreferrer">
                        <img src="/img/github_logo_light.png" alt="github" class="h-6 w-6">
                    </a>
                    <a class="px-2" href="https://www.linkedin.com/in/diego-soriano-8779002a9/" target="_blank" rel="noopener noreferrer">
                        <img src="/img/linkedin_logo_light.png" alt="linkedin" class="h-6 w-6">
                    </a>
                    <a class="px-2" href="mailto:diegosorianomagallon@gmail.com" target="_blank" rel="noopener noreferrer">
                        <img src="/img/svg/mail_24dp_E8EAED_FILL0_wght400_GRAD0_opsz24.svg" alt="mail" class="h-7 w-7">
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="router.js"></script>
